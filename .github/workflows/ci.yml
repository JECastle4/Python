name: CI - Tests & Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov bandit pip-audit pylint radon
    
    - name: Run tests with coverage
      run: |
        PYTHONPATH=. pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing
    
    - name: Security scan - Bandit
      run: |
        bandit -r . -x ./tests,./htmlcov,./__pycache__,./.venv -f json -o bandit-report.json
        bandit -r . -x ./tests,./htmlcov,./__pycache__,./.venv -f screen
    
    - name: Dependency vulnerability scan - pip-audit
      run: |
        # --skip-editable: astronomy-tools is our own local package, not on PyPI
        # CVE-2026-3219 (pip): fixed in pip 26.1
        pip-audit --desc --skip-editable
    
    - name: Code quality - Pylint
      run: |
        pylint *.py api/ --exit-zero --output-format=text --reports=y > pylint-report.txt
        cat pylint-report.txt
      continue-on-error: true
    
    - name: Report Pylint warning if issues found
      run: |
        if [ -f pylint-report.txt ]; then
          # Check for actual violations (lines like path.py:line:col: C0114: ...)
          if grep -qE '^[^:]+:[0-9]+:[0-9]+: [CRWEF][0-9]{4}:' pylint-report.txt; then
            RATING=$(grep "Your code has been rated" pylint-report.txt || echo "Pylint rating unavailable")
            echo "::warning::Code quality issues found - $RATING"
          fi
        fi
    
    - name: Complexity check - Radon
      id: radon_check
      run: |
        radon cc . -a -nb > radon-cc-report.txt
        radon mi . -nb > radon-mi-report.txt
        cat radon-cc-report.txt
        cat radon-mi-report.txt
      continue-on-error: true
    
    - name: Report Radon warning if complexity issues found
      if: always()
      run: |
        # First check if Radon step itself failed
        if [ "${{ steps.radon_check.outcome }}" = "failure" ]; then
          echo "::warning::Radon complexity check failed - manual review may be needed"
          exit 0
        fi
        
        HAS_ISSUES=false
        WARNING=""
        
        # Parse CC report for high complexity (grade D or F)
        if [ -s radon-cc-report.txt ]; then
          HIGH_COMPLEXITY=$(grep -E ' - [DF] \(' radon-cc-report.txt | wc -l)
          if [ "$HIGH_COMPLEXITY" -gt 0 ]; then
            HAS_ISSUES=true
            WARNING="High complexity functions/modules detected ($HIGH_COMPLEXITY)"
          fi
        fi
        
        # Parse MI report against threshold
        if [ -s radon-mi-report.txt ]; then
          MI=$(grep -oP 'Average maintainability index:\s+\K[0-9.]+' radon-mi-report.txt | head -1)
          if [ -n "$MI" ]; then
            if python3 -c "import sys; sys.exit(0 if float('${MI}') < 70 else 1)"; then
              HAS_ISSUES=true
              if [ -z "$WARNING" ]; then
                WARNING="Maintainability index: $MI (aim for ≥70)"
              else
                WARNING="$WARNING | Maintainability index: $MI (aim for ≥70)"
              fi
            fi
          fi
        fi
        
        if [ "$HAS_ISSUES" = true ]; then
          echo "::warning::$WARNING"
        fi
    
    - name: Upload coverage reports
      id: codecov_backend
      uses: codecov/codecov-action@v6
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
    
    - name: Report Codecov warning if upload failed
      if: always() && steps.codecov_backend.outcome == 'failure'
      run: |
        echo "::warning::Codecov upload failed - check https://app.codecov.io/ for details"
    
    - name: Upload security artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          pylint-report.txt

  trivy-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Run Trivy vulnerability scanner - Python dependencies
      # Using pinned version for stability while staying reasonably current
      # Update periodically to get new vulnerability definitions
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        scanners: 'vuln,secret,misconfig'
        format: 'sarif'
        output: 'trivy-python-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
    
    - name: Run Trivy vulnerability scanner - npm dependencies
      # Using pinned version for same reason as above
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: './frontend'
        scanners: 'vuln,secret'
        format: 'sarif'
        output: 'trivy-npm-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
    
    - name: Upload Trivy results to GitHub Security tab
      id: trivy_upload
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: '.'
      continue-on-error: true
    
    - name: Report Trivy upload warning if failed
      if: always() && steps.trivy_upload.outcome == 'failure'
      run: |
        echo "::warning::Trivy results upload failed - check artifacts for trivy-python-results.sarif and trivy-npm-results.sarif"
    
    - name: Upload Trivy artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: trivy-reports
        path: |
          trivy-python-results.sarif
          trivy-npm-results.sarif

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    

    - name: Install frontend dependencies
      run: npm ci

    - name: Set up Python for API
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install fastapi uvicorn
        if [ -f pyproject.toml ]; then pip install -e .; fi
      working-directory: .

    - name: Start FastAPI backend
      run: |
        uvicorn api.main:app --host 127.0.0.1 --port 8000 &
        sleep 5
        curl --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:8000/docs
      working-directory: .
    
    - name: Type check
      run: npm run type-check
    
    - name: Run tests with coverage
      run: npm run test:coverage -- --run
      # Coverage thresholds enforced by vitest.config.ts:
      # - Global: 80% for lines, functions, branches, statements
      # - Per-file: Higher standards for business logic (90-100%)
      # - Exclusions: scene.ts (WebGL), config.ts (environment-dependent)
    
    - name: Upload coverage reports
      id: codecov_frontend
      uses: codecov/codecov-action@v6
      if: always()
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        name: codecov-frontend
      continue-on-error: true
    
    - name: Report Codecov warning if upload failed
      if: always() && steps.codecov_frontend.outcome == 'failure'
      run: |
        echo "::warning::Codecov upload failed - check https://app.codecov.io/ for details"
    
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: frontend-coverage
        path: frontend/coverage/

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci

    - name: Set up Python for API
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install fastapi uvicorn
        if [ -f pyproject.toml ]; then pip install -e .; fi
      working-directory: .

    - name: Start FastAPI backend
      run: |
        uvicorn api.main:app --host 127.0.0.1 --port 8000 &
        sleep 5
        curl --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:8000/docs
      working-directory: .

    - name: Install Playwright Browsers
      run: |
        npx playwright install --with-deps
        npx playwright install msedge --with-deps

    - name: Run Playwright E2E tests
      run: npm run test:e2e
      env:
        CI: true

    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-test-results
        path: |
          frontend/test-results/
          frontend/tests/e2e/astronomy-scene.spec.ts-snapshots/
